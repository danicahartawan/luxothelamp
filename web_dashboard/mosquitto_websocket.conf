# Mosquitto Configuration for WebSocket Support
# Copy this to /etc/mosquitto/conf.d/websocket.conf

# Standard MQTT listener (for Python clients, etc.)
listener 1883
protocol mqtt

# WebSocket listener (for web browsers)
listener 9001
protocol websockets

# Authentication
allow_anonymous false
password_file /etc/mosquitto/passwd

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
log_timestamp true
