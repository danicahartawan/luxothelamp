<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Luxo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lamp-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #d1d1d6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #86868b;
        }

        .lamp-info h1 {
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 2px;
        }

        .lamp-status {
            font-size: 12px;
            color: #86868b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #86868b;
        }

        .status-dot.online {
            background: #34c759;
        }

        .settings-button {
            background: none;
            border: none;
            color: #007aff;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .settings-button:hover {
            background: #f2f2f7;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #ffffff;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.sent {
            justify-content: flex-end;
        }

        .message-wrapper.received {
            justify-content: flex-start;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #e9e9eb;
            color: #000;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #86868b;
            margin-top: 4px;
            text-align: center;
        }

        /* Quick Actions */
        .quick-actions {
            padding: 12px 16px;
            background: #f2f2f7;
            border-bottom: 1px solid #e5e5e5;
            overflow-x: auto;
            white-space: nowrap;
        }

        .quick-actions::-webkit-scrollbar {
            height: 4px;
        }

        .quick-actions::-webkit-scrollbar-thumb {
            background: #c7c7cc;
            border-radius: 2px;
        }

        .quick-action {
            display: inline-block;
            padding: 8px 14px;
            margin-right: 8px;
            background: white;
            border: 1px solid #d1d1d6;
            border-radius: 16px;
            font-size: 13px;
            color: #007aff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action:hover {
            background: #007aff;
            color: white;
            border-color: #007aff;
        }

        /* Input Area */
        .input-area {
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
            padding: 8px 16px 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
        }

        .input-wrapper {
            flex: 1;
            background: #f2f2f7;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 6px 12px;
            min-height: 36px;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            color: #000;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #86868b;
        }

        .send-button {
            width: 32px;
            height: 32px;
            background: #007aff;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-button:hover {
            background: #0051d5;
            transform: scale(1.05);
        }

        .send-button:disabled {
            background: #c7c7cc;
            cursor: not-allowed;
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 14px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 60px);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #86868b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007aff;
        }

        .connect-button {
            width: 100%;
            padding: 12px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .connect-button:hover {
            background: #0051d5;
        }

        .close-button {
            background: none;
            border: none;
            color: #007aff;
            font-size: 16px;
            cursor: pointer;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 10px 14px;
            background: #e9e9eb;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: 60px;
        }

        .typing-indicator.show {
            display: inline-block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #86868b;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Sensor Info Bar */
        .sensor-info {
            background: #f2f2f7;
            padding: 8px 16px;
            border-bottom: 1px solid #e5e5e5;
            font-size: 13px;
            color: #86868b;
            text-align: center;
        }

        .sensor-value {
            color: #007aff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="lamp-avatar">L</div>
            <div class="lamp-info">
                <h1>Luxo</h1>
                <div class="lamp-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Not Connected</span>
                </div>
            </div>
        </div>
        <button class="settings-button" onclick="openSettings()">Connect</button>
    </div>

    <!-- Sensor Info -->
    <div class="sensor-info" id="sensorInfo" style="display: none;">
        Distance: <span class="sensor-value" id="distanceValue">--</span>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <span class="quick-action" onclick="quickSend('be happy')">Be happy</span>
        <span class="quick-action" onclick="quickSend('turn blue')">Turn blue</span>
        <span class="quick-action" onclick="quickSend('nod yes')">Nod yes</span>
        <span class="quick-action" onclick="quickSend('play all')">Play all</span>
        <span class="quick-action" onclick="quickSend('rainbow')">Rainbow</span>
        <span class="quick-action" onclick="quickSend('wake up')">Wake up</span>
    </div>

    <!-- Messages Container -->
    <div class="messages-container" id="messagesContainer">
        <div class="message-wrapper received">
            <div class="message received" id="initialMessage"></div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                id="messageInput"
                placeholder="Message"
                rows="1"
                onkeypress="handleKeyPress(event)"
                oninput="autoResize(this)"
            ></textarea>
        </div>
        <button class="send-button" onclick="sendMessage()" id="sendButton">
            ↑
        </button>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Connection Settings</h2>
                <button class="close-button" onclick="closeSettings()">Done</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>MQTT Broker</label>
                    <input type="text" id="broker" value="localhost" placeholder="localhost or IP address">
                </div>
                <div class="form-group">
                    <label>Port</label>
                    <input type="number" id="port" value="9001" placeholder="9001">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" value="lelamp" placeholder="lelamp">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" value="lelamp123" placeholder="Password">
                </div>
                <button class="connect-button" onclick="connect()">Connect to Luxo</button>
            </div>
        </div>
    </div>

    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        let client = null;

        function openSettings() {
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const sensorInfo = document.getElementById('sensorInfo');

            if (connected) {
                dot.classList.add('online');
                text.textContent = 'Connected';
                sensorInfo.style.display = 'block';
            } else {
                dot.classList.remove('online');
                text.textContent = 'Not Connected';
                sensorInfo.style.display = 'none';
            }
        }

        function addMessage(text, isSent = false) {
            const container = document.getElementById('messagesContainer');
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;

            const message = document.createElement('div');
            message.className = `message ${isSent ? 'sent' : 'received'}`;

            wrapper.appendChild(message);
            container.appendChild(wrapper);

            // Typewriter effect for received messages only
            if (!isSent) {
                let index = 0;
                message.textContent = '';
                const typeInterval = setInterval(() => {
                    if (index < text.length) {
                        message.textContent += text.charAt(index);
                        index++;
                        container.scrollTop = container.scrollHeight;
                    } else {
                        clearInterval(typeInterval);
                    }
                }, 30); // 30ms per character
            } else {
                message.textContent = text;
            }

            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('messagesContainer');
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper received';
            wrapper.id = 'typingIndicator';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator show';
            indicator.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

            wrapper.appendChild(indicator);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function connect() {
            const broker = document.getElementById('broker').value;
            const port = document.getElementById('port').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            addMessage(`Connecting to ${broker}...`, false);

            client = mqtt.connect(`ws://${broker}:${port}`, {
                username, password, reconnectPeriod: 5000
            });

            client.on('connect', () => {
                updateStatus(true);
                addMessage('Connected', false);
                client.subscribe('lelamp/#');
                closeSettings();
            });

            client.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());

                if (topic.includes('/sensor/ultrasonic/distance')) {
                    document.getElementById('distanceValue').textContent =
                        `${data.distance_cm.toFixed(1)} cm`;
                } else if (topic.includes('/sensor/ultrasonic/wave')) {
                    addMessage('I saw you wave', false);
                } else if (topic.includes('/expression/playing')) {
                    addMessage(`Playing: ${data.expression}`, false);
                }
            });

            client.on('error', (err) => {
                addMessage(`Connection error: ${err.message}`, false);
                updateStatus(false);
            });

            client.on('close', () => {
                updateStatus(false);
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            if (!client || !client.connected) {
                addMessage('Please connect first (tap "Connect" button)', false);
                return;
            }

            addMessage(text, true);
            input.value = '';
            autoResize(input);

            showTyping();
            setTimeout(() => {
                hideTyping();
                processCommand(text);
            }, 500);
        }

        function quickSend(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function processCommand(text) {
            const lower = text.toLowerCase();

            const expressionMap = {
                'happy': 'happy_wiggle',
                'excited': 'excited',
                'sad': 'sad',
                'curious': 'curious',
                'nod': 'nod',
                'yes': 'nod',
                'no': 'headshake',
                'shake': 'headshake',
                'shy': 'shy',
                'shock': 'shock',
                'surprised': 'shock',
                'scan': 'scanning',
                'wake': 'wake_up'
            };

            const colorMap = {
                'red': {r: 255, g: 0, b: 0},
                'green': {r: 0, g: 255, b: 0},
                'blue': {r: 0, g: 0, b: 255},
                'yellow': {r: 255, g: 255, b: 0},
                'purple': {r: 255, g: 0, b: 255},
                'orange': {r: 255, g: 150, b: 0},
                'pink': {r: 255, g: 100, b: 180},
                'white': {r: 255, g: 255, b: 255}
            };

            if (lower.includes('play all') || lower.includes('show all')) {
                client.publish('lelamp/lelamp/command/play_all', '{}');
                addMessage('Playing all expressions', false);
                return;
            }

            for (let [keyword, expression] of Object.entries(expressionMap)) {
                if (lower.includes(keyword)) {
                    client.publish('lelamp/lelamp/command/play',
                        JSON.stringify({ expression }));
                    addMessage(`On it! Playing ${expression}`, false);
                    return;
                }
            }

            for (let [keyword, rgb] of Object.entries(colorMap)) {
                if (lower.includes(keyword)) {
                    client.publish('lelamp/lelamp/command/rgb', JSON.stringify(rgb));
                    addMessage(`Changing to ${keyword}`, false);
                    return;
                }
            }

            if (lower.includes('rainbow')) {
                addMessage('Rainbow mode', false);
                const colors = Object.values(colorMap);
                let i = 0;
                const interval = setInterval(() => {
                    if (i >= colors.length) {
                        clearInterval(interval);
                        return;
                    }
                    client.publish('lelamp/lelamp/command/rgb', JSON.stringify(colors[i]));
                    i++;
                }, 800);
                return;
            }

            addMessage(`I'm not sure what you mean. Try "be happy", "turn red", or "play all"`, false);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // Auto-scroll on new messages
        const observer = new MutationObserver(() => {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        });

        observer.observe(document.getElementById('messagesContainer'), {
            childList: true
        });

        // Typewriter effect for initial message
        window.addEventListener('load', () => {
            const initialMessage = document.getElementById('initialMessage');
            const text = "Hi I'm Luxo how are you doing today?";
            let index = 0;

            const typeInterval = setInterval(() => {
                if (index < text.length) {
                    initialMessage.textContent += text.charAt(index);
                    index++;
                } else {
                    clearInterval(typeInterval);
                }
            }, 30);
        });
    </script>
</body>
</html>
